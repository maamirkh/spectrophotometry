<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrophotometry</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0a0e27 0%, #1a1040 25%, #0d2137 50%, #0a2a1f 75%, #0a0e27 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    overflow: hidden;
    position: relative;
  }

  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Floating light particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: float linear infinite;
  }

  @keyframes float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* Spectrum band across the page */
  .spectrum-band {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg,
      #8b00ff, #4b0082, #0000ff, #007fff, #00bfff,
      #00ff7f, #7fff00, #ffff00, #ffa500, #ff4500, #ff0000
    );
    z-index: 10;
    opacity: 0.8;
  }

  .spectrum-band-bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg,
      #ff0000, #ff4500, #ffa500, #ffff00, #7fff00,
      #00ff7f, #00bfff, #007fff, #0000ff, #4b0082, #8b00ff
    );
    z-index: 10;
    opacity: 0.8;
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 50px;
    max-width: 700px;
    width: 90%;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
    animation: cardFadeIn 1s ease-out;
  }

  @keyframes cardFadeIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Light icon */
  .icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 30px;
    position: relative;
  }

  .prism {
    width: 0;
    height: 0;
    border-left: 35px solid transparent;
    border-right: 35px solid transparent;
    border-bottom: 60px solid rgba(255, 255, 255, 0.12);
    margin: 0 auto;
    position: relative;
    filter: drop-shadow(0 0 15px rgba(100, 150, 255, 0.3));
  }

  .prism::after {
    content: '';
    position: absolute;
    top: 20px;
    left: 15px;
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #0088ff, #8800ff);
    transform: rotate(15deg);
    border-radius: 2px;
    filter: blur(1px);
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
  }

  /* Title */
  .title {
    font-size: 3.2rem;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #e0e8ff 0%, #a8c0ff 30%, #88d8ff 60%, #c8e0ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    line-height: 1.2;
  }

  /* Subtitle */
  .subtitle {
    font-size: 1.15rem;
    color: rgba(180, 200, 230, 0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
    font-weight: 300;
  }

  /* CTA Button */
  .cta-btn {
    display: inline-block;
    padding: 16px 48px;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 1px;
    color: #fff;
    text-decoration: none;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #4a6cf7 0%, #6c3bdb 50%, #8b2fc9 100%);
    background-size: 200% 200%;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 4px 20px rgba(74, 108, 247, 0.35);
    animation: btnGlow 3s ease-in-out infinite;
  }

  @keyframes btnGlow {
    0%, 100% { box-shadow: 0 4px 20px rgba(74, 108, 247, 0.35); }
    50%      { box-shadow: 0 4px 35px rgba(108, 59, 219, 0.55), 0 0 60px rgba(74, 108, 247, 0.15); }
  }

  .cta-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 40px rgba(74, 108, 247, 0.5);
  }

  .cta-btn:active {
    transform: translateY(-1px) scale(1.01);
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 200%;
    height: 200%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.15),
      transparent
    );
    transform: rotate(25deg);
    animation: shimmer 4s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { left: -60%; }
    50%      { left: 60%; }
  }

  .btn-arrow {
    display: inline-block;
    margin-left: 8px;
    transition: transform 0.3s ease;
  }

  .cta-btn:hover .btn-arrow {
    transform: translateX(4px);
  }

  /* Footer note */
  .footer-note {
    margin-top: 36px;
    font-size: 0.8rem;
    color: rgba(150, 170, 200, 0.4);
    letter-spacing: 1px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .card {
      padding: 40px 24px;
    }
    .title {
      font-size: 2rem;
      letter-spacing: 1px;
    }
    .subtitle {
      font-size: 0.9rem;
      letter-spacing: 2px;
    }
    .cta-btn {
      padding: 14px 36px;
      font-size: 0.95rem;
    }
    .icon { width: 60px; height: 60px; }
    .prism {
      border-left-width: 25px;
      border-right-width: 25px;
      border-bottom-width: 44px;
    }
    .prism::after {
      width: 60px;
      left: 8px;
      top: 14px;
    }
  }
</style>
</head>
<body>

<div class="spectrum-band"></div>
<div class="spectrum-band-bottom"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Main Card -->
<div class="card">
  <div class="icon">
    <div class="prism"></div>
  </div>
  <h1 class="title">Spectrophotometry</h1>
  <p class="subtitle">Principle, Instrumentation &amp; Applications</p>
  <a href="simulation.html" class="cta-btn">
    Launch Simulator <span class="btn-arrow">&rarr;</span>
  </a>
  <p class="footer-note">Interactive 3D Simulation</p>
</div>

<script>
  // Generate floating particles
  (function() {
    var container = document.getElementById('particles');
    var colors = [
      'rgba(74,108,247,0.6)', 'rgba(108,59,219,0.5)', 'rgba(0,191,255,0.4)',
      'rgba(127,255,0,0.3)', 'rgba(255,165,0,0.3)', 'rgba(255,69,0,0.3)',
      'rgba(139,0,255,0.4)', 'rgba(0,127,255,0.4)'
    ];
    for (var i = 0; i < 30; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var size = Math.random() * 4 + 2;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (Math.random() * 10 + 8) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(p);
    }
  })();
</script>
</body>
</html>
